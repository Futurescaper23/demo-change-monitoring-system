<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Secure Access | FutureScaping Coastal Change Demo</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07111f;
        --panel: rgba(14, 27, 49, 0.92);
        --line: rgba(132, 176, 245, 0.18);
        --text: #eef5ff;
        --muted: rgba(214, 228, 247, 0.78);
        --accent: #63c8ff;
        --accent-2: #2d6dff;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(83, 149, 255, 0.2), transparent 24%),
          radial-gradient(circle at bottom right, rgba(99, 200, 255, 0.16), transparent 20%),
          linear-gradient(180deg, #07111f 0%, #0b1830 100%);
      }

      .login-shell {
        width: min(460px, 100%);
        padding: 28px;
        border-radius: 26px;
        border: 1px solid var(--line);
        background:
          radial-gradient(circle at top right, rgba(99, 200, 255, 0.12), transparent 28%),
          linear-gradient(180deg, rgba(20, 35, 60, 0.98), rgba(10, 19, 35, 0.98));
        box-shadow: 0 28px 70px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 4vw, 2.6rem);
        line-height: 0.95;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      form {
        display: grid;
        gap: 14px;
        margin-top: 22px;
      }

      label {
        display: grid;
        gap: 8px;
        font-size: 0.92rem;
        color: var(--muted);
      }

      input {
        width: 100%;
        padding: 14px 16px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(8, 18, 33, 0.92);
        color: var(--text);
        font: inherit;
      }

      input:focus {
        outline: 2px solid rgba(99, 200, 255, 0.45);
        outline-offset: 2px;
      }

      button {
        margin-top: 8px;
        padding: 14px 18px;
        border: 0;
        border-radius: 16px;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        color: white;
        background: linear-gradient(180deg, var(--accent-2), #1f56d8);
        box-shadow: 0 16px 30px rgba(28, 79, 201, 0.28);
      }

      button:hover { filter: brightness(1.06); }

      .status {
        min-height: 24px;
        margin-top: 12px;
        font-size: 0.95rem;
      }

      .status.error { color: #ff9da9; }
      .status.ok { color: #98f0c2; }

      .help {
        margin-top: 18px;
        font-size: 0.88rem;
      }
    </style>
  </head>
  <body>
    <main class="login-shell">
      <p>Secure Access</p>
      <h1>FutureScaping Coastal Change Demo</h1>
      <p>Enter the username and password you have been given to open the monitoring report.</p>

      <form id="loginForm">
        <label>
          Username
          <input id="username" name="username" type="text" autocomplete="username" required>
        </label>
        <label>
          Password
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </label>
        <button type="submit">Open Report</button>
      </form>

      <div id="status" class="status" aria-live="polite"></div>
      <p class="help">Temporary logins can expire automatically. If your access stops working, ask FutureScaping for a fresh login.</p>
    </main>

    <script>
      const form = document.getElementById("loginForm");
      const status = document.getElementById("status");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        status.className = "status";
        status.textContent = "Checking access...";

        const payload = {
          username: form.username.value.trim(),
          password: form.password.value
        };

        try {
          const response = await fetch("/api/site-auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          const body = await response.json().catch(() => ({}));

          if (!response.ok) {
            status.className = "status error";
            status.textContent = body.error || "Could not log in.";
            return;
          }

          status.className = "status ok";
          status.textContent = "Access granted. Opening report...";
          window.location.href = "/";
        } catch (error) {
          status.className = "status error";
          status.textContent = "Could not reach the server.";
        }
      });
    </script>
  </body>
</html>
